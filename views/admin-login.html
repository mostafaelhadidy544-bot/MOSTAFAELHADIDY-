<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>تسجيل دخول الإدارة | الأستاذ مصطفى الحديدي</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Cairo',sans-serif;
    min-height:100vh;display:grid;place-items:center;
    background:
      radial-gradient(800px 400px at 20% 20%, rgba(6,182,212,.25), transparent 60%),
      linear-gradient(160deg,#0F172A,#1E40AF);
    color:#0f1830;direction:rtl;padding:20px;
  }
  .card{
    background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:400px;
    box-shadow:0 40px 100px rgba(0,0,0,.4);
  }
  .logo{
    width:72px;height:72px;border-radius:18px;
    background:linear-gradient(135deg,#1E40AF,#2563EB);
    color:#06B6D4;display:grid;place-items:center;font-weight:900;font-size:36px;
    margin:0 auto 20px;box-shadow:0 12px 24px rgba(30,64,175,.35);
  }
  h1{text-align:center;color:#1E40AF;font-size:22px;margin-bottom:6px}
  .sub{text-align:center;color:#5b6577;font-size:14px;margin-bottom:24px}
  label{display:block;font-weight:700;margin-bottom:6px;font-size:14px}
  input{
    width:100%;padding:13px 14px;border:2px solid #e1e8f5;border-radius:12px;
    background:#f7faff;font-family:inherit;font-size:15px;margin-bottom:14px;
  }
  input:focus{outline:none;border-color:#1E40AF;background:#fff}
  button{
    width:100%;padding:14px;border:0;border-radius:12px;cursor:pointer;
    background:linear-gradient(135deg,#1E40AF,#2563EB);color:#fff;
    font-family:inherit;font-weight:800;font-size:16px;
    box-shadow:0 10px 24px rgba(30,64,175,.3);
  }
  .err{
    background:#ffecec;color:#c0392b;padding:10px 12px;border-radius:10px;
    margin-bottom:14px;font-size:14px;text-align:center;font-weight:600;
  }
  .back{display:block;text-align:center;margin-top:18px;color:#5b6577;font-size:13px;text-decoration:none}
</style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <div class="logo">م</div>
    <h1>لوحة الإدارة</h1>
    <p class="sub">الأستاذ مصطفى الحديدي - اللغة العربية</p>
    {{ERROR}}
    <label for="u">اسم المستخدم</label>
    <input id="u" name="username" required autocomplete="username" />
    <label for="p">كلمة المرور</label>
    <input id="p" name="password" type="password" required autocomplete="current-password" />
    <button type="submit">دخول</button>
    <a href="/" class="back">← العودة للموقع</a>
  </form>
<script>
  // wrap error if present
  var err = "{{ERROR}}";
</script>
</body>
</html>
